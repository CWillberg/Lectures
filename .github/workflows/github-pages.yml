name: GitHub Pages
on:
  push:
    branches:
      - main
    paths:
      - "**.md"
      - "themes/**"
      - ".github/workflows/**"
      - "assets/**"
      - "**/assets/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    strategy:
      max-parallel: 20
      fail-fast: false
      matrix:
        folder:
          # ── FractureFatigue ──────────────────────────────────────
          - FractureFatigue/FF_introduction
          - FractureFatigue/FF_bonds
          - FractureFatigue/FF_strength
          - FractureFatigue/FF_types_of_fatigue
          - FractureFatigue/FF_seminar_math
          - FractureFatigue/FF_seminar_math_II
          - FractureFatigue/FF_seminar_math_III
          - FractureFatigue/FF_seminar_math_IV
          - FractureFatigue/FF_seminar_V
          # ── andere Kurse (unverändert) ───────────────────────────
          - Faserverbund_02
          - pd_01
          - fracture_and_fatigue_01
          - wst2_mb_w0_Kurs
          - wst2_mb_w1_bindungen
          - wst2_mb_w1_bindungen_seminar
          - wst2_mb_w2_festigkeit_plastizitaet
          - wst2_mb_w2_festigkeit_plastizitaet_seminar
          - wst2_mb_w3_Spannungen_Dehnungen
          - wst2_mb_w3_Spannungen_Dehnungen_Seminar
          - wst_mb_01
          - wst_mb_02
          - wst_mb_03
          - wst_mb_04
          - wst_mb_05
          - wst_mb_06
          - wst_mb_07
          - wst_mb_08
          - wst_mb_09
          - wst_mb_10
          - wst_mb_11
          - wst_mb_12
          - wst_mb_13
          - mti_ft_01
          - mti_ft_02
          - mti_ft_03
          - mti_ft_04
          - mti_ft_05
          - mti_ft_06
          - mti_ft_07
          - mti_ft_08
          - mti_ft_09
          - mti_ft_10
          - mti_ft_11
          - mti_ft_12
          - mti_ft_13
          - mti_ft_14
          - stream_mech_01
          - stream_wst_01
          - stream_wst_02
          - stream_wst_03
          - stream_wst_04
          - stream_wst_05
          - stream_wst_06
          - stream_wst_07
          - stream_wst_08
          - stream_wst_09
          - stream_wst_10
          - stream_wst_11
          - stream_wst_12
          - Faserverbundwerkstoffe/composites_01
          - Faserverbundwerkstoffe/composites_02
          - Faserverbundwerkstoffe/composites_02_seminar
          - Faserverbundwerkstoffe/composites_03
          - Faserverbundwerkstoffe/composites_04
          - Faserverbundwerkstoffe/composites_05
          - Faserverbundwerkstoffe/composites_06
          - Faserverbundwerkstoffe/composites_07
          - Faserverbundwerkstoffe/composites_08
          - Faserverbundwerkstoffe/composites_09
          - Berufsschule
          - gju_01
          - gju_mech
          - GJU_mat_introduction
          - gju_01_questions

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build HTML
        run: |
          FOLDER="${{ matrix.folder }}"
          mkdir -p "public/${FOLDER}"

          if [ -d "${FOLDER}/assets" ]; then
            cp -r "${FOLDER}/assets" "public/${FOLDER}/"
          fi

          npx @marp-team/marp-cli@latest "${FOLDER}/index.md" \
            --theme-set themes/ \
            --html \
            --allow-local-files \
            -o "public/${FOLDER}/index.html"
        timeout-minutes: 2

      - name: Sanitize artifact name
        id: sanitize
        run: echo "name=$(echo '${{ matrix.folder }}' | tr '/' '_')" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: public
          name: ${{ steps.sanitize.outputs.name }}
          retention-days: 1

  deploy:
    needs: build
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: public
          merge-multiple: true

      - name: Copy global assets
        run: |
          if [ -d "assets" ]; then
            cp -r assets public/assets
          fi

      - name: Copy themes
        run: |
          if [ -d "themes" ]; then
            cp -r themes public/themes
          fi

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
